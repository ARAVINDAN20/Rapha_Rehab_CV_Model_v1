name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  APP_NAME: physioguard

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Get ECR repository URL
      id: ecr-url
      run: |
        ECR_URL=$(aws ecr describe-repositories --repository-names ${{ env.APP_NAME }} --query 'repositories[0].repositoryUri' --output text)
        echo "url=$ECR_URL" >> $GITHUB_OUTPUT

    - name: Build, tag, and push image to ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/${{ env.APP_NAME }}:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/${{ env.APP_NAME }}:latest .
        docker push $ECR_REGISTRY/${{ env.APP_NAME }}:$IMAGE_TAG
        docker push $ECR_REGISTRY/${{ env.APP_NAME }}:latest
        echo "image=$ECR_REGISTRY/${{ env.APP_NAME }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Update ECS service
      run: |
        aws ecs update-service \
          --cluster ${{ env.APP_NAME }}-cluster \
          --service ${{ env.APP_NAME }}-service \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}

    - name: Wait for deployment
      run: |
        aws ecs wait services-stable \
          --cluster ${{ env.APP_NAME }}-cluster \
          --services ${{ env.APP_NAME }}-service \
          --region ${{ env.AWS_REGION }}

    - name: Deployment summary
      run: |
        echo "### Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
        echo "- Image: ${{ steps.build-image.outputs.image }}" >> $GITHUB_STEP_SUMMARY
        echo "- Region: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
